<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-image 0.5s ease;
        }

        /* 动态题目背景 */
        body.bg-1 {
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('bg1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body.bg-2 {
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('bg2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body.bg-3 {
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('bg3.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 答题页面背景题号 */
        .question-number-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 280px;
            font-weight: 900;
            color: rgba(220, 220, 220, 0.15);
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 滑动动画 */
        .slide-enter {
            transform: translateX(100%);
            opacity: 0;
        }

        .slide-active {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        /* 圆角 */
        .rounded-xl {
            border-radius: 20px;
        }

        .rounded-2xl {
            border-radius: 28px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal-box {
            transform: scale(1);
        }

        /* 选项选中样式 */
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn.selected {
            background-color: #fff7ed;
            border-color: #fb923c;
            color: #c2410c;
        }
    </style>
</head>

        grid.innerHTML = '';
        characters.forEach((c, i) => {
            const card = document.createElement('div');
            card.className = 'bg-white p-4 rounded-xl shadow text-center cursor-pointer hover:-translate-y-1 transition-transform';
            card.innerHTML = `
                <img src="${c.img}" class="w-24 h-24 rounded-full object-cover mx-auto mb-3">
                <p class="font-bold">${c.name}</p>
                <p class="text-xs text-gray-500">${c.game}</p>
            `;
            card.onclick = () => openModal(i);
            grid.appendChild(card);
        });
    }

    // 弹窗
    function openModal(i) {
        const c = characters[i];
        document.getElementById('modalImg').src = c.img;
        document.getElementById('modalName').textContent = c.name;
        document.getElementById('modalGame').textContent = c.game + ' · ' + c.type;
        document.getElementById('modalDesc').textContent = c.desc;
        document.getElementById('charModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('charModal').classList.remove('show');
    }

    // 页面切换
    function showAll(id) {
        document.getElementById('startPage').classList.add('hidden');
        document.getElementById('bookPage').classList.add('hidden');
        document.getElementById('testPage').classList.add('hidden');
        document.getElementById('resultPage').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        
        if(id !== 'testPage') {
            document.body.classList.remove('bg-1','bg-2','bg-3');
        }
    }

    function backToStart() {
        currentQ = 0;
        answers.fill(null);
        dCount = 0;
        document.body.classList.remove('bg-1','bg-2','bg-3');
        showAll('startPage');
    }

    function showBook() {
        initGrid();
        showAll('bookPage');
    }

    // 答题
    function startTest() {
        currentQ = 0;
        answers.fill(null);
        dCount = 0;
        renderQuestion();
        updateBackground();
        showAll('testPage');
    }

    function renderQuestion() {
        const q = questions[currentQ];
        const card = document.getElementById('questionCard');
        card.classList.remove('slide-active');

        setTimeout(() => {
            document.getElementById('questionTitle').textContent = q.q;
            document.getElementById('qBgNum').textContent = String(currentQ + 1).padStart(2, '0');
            document.getElementById('progressText').textContent = `${currentQ + 1}/60`;
            document.getElementById('progressBar').style.width = ((currentQ + 1) / 60 * 100) + '%';

            const optBox = document.getElementById('options');
            optBox.innerHTML = '';
            ['A', 'B', 'C', 'D'].forEach((k, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-4 border rounded-xl text-left hover:bg-orange-50 transition-colors';
                btn.textContent = k + ' · ' + q.a[i];
                btn.onclick = () => selectAnswer(k, btn);
                if (answers[currentQ] === k) {
                    btn.classList.add('selected');
                }
                optBox.appendChild(btn);
            });

            card.classList.add('slide-active');
        }, 100);
    }

    function selectAnswer(k, btnEl) {
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        btnEl.classList.add('selected');
        answers[currentQ] = k;
        if (currentQ >= 51 && k === 'D') dCount++;
        setTimeout(() => {
            if (currentQ >= 59) {
                showResult();
            } else {
                nextQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (answers[currentQ] === null) {
            alert('请先选择一个选项');
            return;
        }
        currentQ++;
        updateBackground();
        if (currentQ >= 60) {
            showResult();
        } else {
            renderQuestion();
        }
    }

    function prevQuestion() {
        if (currentQ <= 0) return;
        currentQ--;
        updateBackground();
        renderQuestion();
    }

    // 结果
    function showResult() {
        let target;
        if (dCount >= 3) {
            target = characters.find(c => c.name === '王川');
        } else {
            target = characters[Math.floor(Math.random() * characters.length)];
        }

        document.getElementById('resultAvatar').src = target.img;
        document.getElementById('resultName').textContent = target.name + ' · ' + target.type;
        document.getElementById('resultIntro').textContent = target.desc;
        document.getElementById('resultTip').textContent = target.game + ' · 维度接近平衡时已取略偏方向';

        const ei = Math.random() * 100;
        const sn = Math.random() * 100;
        const tf = Math.random() * 100;
        const jp = Math.random() * 100;

        document.getElementById('eiBar').style.width = ei + '%';
        document.getElementById('snBar').style.width = sn + '%';
        document.getElementById('tfBar').style.width = tf + '%';
        document.getElementById('jpBar').style.width = jp + '%';

        showAll('resultPage');
    }
</script>
</body>
</html>
